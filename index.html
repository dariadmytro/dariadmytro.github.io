<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дарія & Дмитро – Запрошення</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#b45a76;
  --glass1: rgba(255,255,255,0.18);
  --glass2: rgba(255,255,255,0.12);
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"Cormorant Garamond", serif;
  color:#1f1f1f;
  text-align:center;
}

/* background slideshow */
.bg{
  position:fixed;
  inset:0;
  z-index:-2;
  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
  transform:scale(1.1);
  transition:opacity 1s ease;
}

.bg-overlay{
  position:fixed;
  inset:0;
  z-index:-1;
  background:rgba(0,0,0,0.35);
}

.container{
  padding:30px 16px;
  max-width:850px;
  margin:auto;
}

.card{
  background:var(--glass1);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.18);
  padding:26px 18px;
  opacity:0;
  transform:translateY(18px);
  transition:opacity 800ms ease, transform 800ms ease;
}

.card.revealed{
  opacity:1;
  transform:translateY(0);
}

.hero-title{
  font-family:"Allura", cursive;
  font-size:72px;
  margin:0;
}

.hero-sub{
  font-size:20px;
  margin-top:5px;
}

.timer{
  font-size:28px;
  margin-top:14px;
  font-weight:600;
}

/* map */
.map iframe{
  width:100%;
  height:320px;
  border-radius:12px;
  border:0;
}

.map-btn{
  margin-top:12px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* RSVP */
.rsvp{
  margin-top:30px;
  padding:20px;
  background:var(--glass2);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:12px;
  text-align:left;
  position:relative;
}

.rsvp::before{
  content:"";
  position:absolute;
  top:10px;
  left:10px;
  width:42px;
  height:42px;
  background:url("images/rings.png") no-repeat center;
  background-size:contain;
}

.rsvp h2{
  text-align:center;
  margin:0 0 12px;
  padding-left:50px;
}

.rsvp input[type="text"]{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #ddd;
}

.option{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  margin-top:6px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
}

.rsvp button{
  margin-top:16px;
  width:100%;
  padding:12px;
  background:var(--accent);
  border:none;
  border-radius:12px;
  color:white;
  font-size:16px;
}

/* calendar */
.mini-cal{
  max-width:340px;
  margin:18px auto 10px;
  padding:14px;
  background:rgba(255,255,255,0.10);
  border-radius:16px;
}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  padding:8px 0;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
}

.day.heart{
  position:relative;
}

.day.heart::after{
  content:"❤";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ff3b3b;
  animation:heartbeat 1.6s infinite;
}

@keyframes heartbeat{
0%{transform:scale(1)}
25%{transform:scale(1.15)}
50%{transform:scale(1)}
75%{transform:scale(1.15)}
100%{transform:scale(1)}
}

/* INTRO curtain */
.intro{
  position:fixed;
  inset:0;
  z-index:9999;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.curtain{
  position:absolute;
  inset:0;
}

.curtain-panel{
  position:absolute;
  top:0;
  bottom:0;
  width:50%;
  background-image:url("images/photo1.jpg");
  background-repeat:no-repeat;
  background-size:200% 100%;
  transition:transform 900ms cubic-bezier(.2,.9,.2,1);
}

.curtain-panel.left{
  left:0;
  background-position:0% center;
}

.curtain-panel.right{
  right:0;
  background-position:100% center;
}

.intro.open .curtain-panel.left{
  transform:translateX(-105%);
}

.intro.open .curtain-panel.right{
  transform:translateX(105%);
}

.intro-title{
  font-family:"Allura", cursive;
  font-size:90px;
}

.swipe{
  margin-top:30px;
  animation:swipeMove 1.8s infinite;
}

@keyframes swipeMove{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}
</style>
</head>

<body>

<!-- intro -->
<div class="intro" id="intro">
<div class="curtain">
<div class="curtain-panel left"></div>
<div class="curtain-panel right"></div>
</div>

<div>
<h1 class="intro-title">Daria & Dmytro</h1>
<p>01 серпня 2026</p>
<div class="swipe">⬆ свайпніть вгору</div>
</div>
</div>

<div class="bg" id="bg"></div>
<div class="bg-overlay"></div>

<div class="container">
<div class="card" id="mainCard">

<h1 class="hero-title">Daria & Dmytro</h1>
<div class="hero-sub">01 серпня 2026 • 15:00</div>

<p>Ми будемо раді бачити вас на нашому весіллі ❤️</p>

<div class="mini-cal">
<div class="cal-grid">
<div></div><div></div><div></div><div></div><div></div>
<div class="day heart">1</div>
<div class="day">2</div>
</div>
</div>

<div class="timer" id="countdown"></div>

<p>📍 Ресторан «RoseMarine», Кривий Ріг</p>

<div class="map">
<iframe src="https://www.google.com/maps?q=47.96447237791111,33.441974116157695&z=17&output=embed"></iframe>
</div>

<button class="map-btn" onclick="openMap()">Відкрити карту</button>

<div class="rsvp">
<h2>Підтвердіть вашу присутність</h2>

<form action="https://formspree.io/f/xeerjolk" method="POST">

<label>Імʼя та прізвище</label>
<input type="text" name="name" required>

<label>Чи будете присутні?</label>

<label class="option"><input type="radio" name="attendance" value="Буду">Буду</label>
<label class="option"><input type="radio" name="attendance" value="Не зможу">Не зможу</label>

<label>Який алкоголь оберете?</label>

<label class="option"><input type="checkbox" name="alcohol[]" value="Вино">Вино</label>
<label class="option"><input type="checkbox" name="alcohol[]" value="Горілка">Горілка</label>
<label class="option"><input type="checkbox" name="alcohol[]" value="Коньяк">Коньяк</label>
<label class="option"><input type="checkbox" name="alcohol[]" value="Шампанське">Шампанське</label>

<button type="submit">Підтвердити</button>

</form>
</div>

</div>
</div>

<script>
const intro=document.getElementById("intro");
const mainCard=document.getElementById("mainCard");

function hideIntro(){
intro.classList.add("open");
mainCard.classList.add("revealed");
setTimeout(()=>{intro.style.display="none"},1200);
}

let startY=0;

intro.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY;
});

intro.addEventListener("touchmove",e=>{
if(startY-e.touches[0].clientY>50) hideIntro();
});

window.addEventListener("wheel",e=>{
if(e.deltaY>10) hideIntro();
});

function openMap(){
window.open("https://www.google.com/maps?q=47.96447237791111,33.441974116157695");
}

const weddingDate=new Date("August 1, 2026 15:00:00").getTime();

setInterval(()=>{
const now=new Date().getTime();
const d=weddingDate-now;

const days=Math.floor(d/(1000*60*60*24));
const hours=Math.floor((d%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((d%(1000*60*60))/(1000*60));
const seconds=Math.floor((d%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+" днів "+hours+" год "+minutes+" хв "+seconds+" сек ";
},1000);

const photos=["images/photo1.jpg","images/photo2.jpg","images/photo3.jpg"];
const bg=document.getElementById("bg");
let i=0;

function setBg(){
bg.style.backgroundImage=`url(${photos[i]})`;
i=(i+1)%photos.length;
}

setBg();
setInterval(setBg,7000);
</script>

</body>
</html>
