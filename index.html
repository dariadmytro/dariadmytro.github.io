<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Дарія & Дмитро – Запрошення</title>

<style>
  body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#f8e1e7,#ffffff);
    color:#333;
  }

  .container{
    padding:40px 20px;
    max-width:800px;
    margin:auto;
  }

  h1{font-size:36px;margin:0 0 6px;}
  h2{font-weight:normal;margin:0 0 12px;}

  .timer{
    font-size:28px;
    margin-top:18px;
    font-weight:bold;
  }

  .map{ margin-top:25px; }
  .map iframe{
    width:100%;
    height:320px;
    border:0;
    border-radius:12px;
  }

  .open-map{ margin-top:12px; }
  .map-btn{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#b45a76;
    color:white;
    font-size:16px;
    cursor:pointer;
  }

  /* RSVP block */
  .rsvp{
    margin-top:50px;
    padding:25px;
    background:white;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    text-align:left;
  }

  .rsvp h2{
    text-align:center;
    margin:0 0 18px;
    font-weight:700;
  }

  .rsvp label.title{
    display:block;
    margin-top:14px;
    font-weight:700;
  }

  .rsvp input[type="text"]{
    width:100%;
    padding:10px;
    margin-top:6px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    box-sizing:border-box;
  }

  .options{
    margin-top:8px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .option{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border:1px solid #eee;
    border-radius:10px;
    cursor:pointer;
    user-select:none;
  }

  .option input{
    transform: scale(1.15);
    cursor:pointer;
  }

  .option span{
    font-size:14px;
  }

  .rsvp button{
    margin-top:18px;
    width:100%;
    padding:12px;
    background:#b45a76;
    border:none;
    border-radius:10px;
    color:white;
    font-size:16px;
    cursor:pointer;
  }

  .note{
    margin-top:10px;
    font-size:13px;
    opacity:0.75;
    text-align:center;
  }
</style>
</head>

<body>
<div class="container">

  <h1>💍 Daria & Dmytro</h1>
  <h2>01.08.2026•15:00</h2>

  <p>Ми будемо раді бачити Вас на нашому весіллі ❤️</p>

  <p style="margin-top:25px; font-size:22px; margin-bottom:0;">
    ✨ До нашого весілля залишилось всього ✨
  </p>

  <div class="timer" id="countdown"></div>

  <p style="margin-top:30px; margin-bottom:10px;">
    📍 Ресторан «RoseMarine», Кривий Ріг
  </p>

  <div class="map">
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d944.540017657618!2d33.441354649990835!3d47.96418157398037!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40db1f003f286b05%3A0xf99a77aa010cfefb!2z0KDQtdGB0YLQvtGA0LDQvSAi0JzQsNCz0LXQu9C70LDQvSIu!5e0!3m2!1sru!2sua!4v1772679365465!5m2!1sru!2sua"
      loading="lazy"
      allowfullscreen=""
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>

  <div class="open-map">
    <button class="map-btn" onclick="openMap()">Відкрити карту</button>
  </div>

  <!-- RSVP FORM -->
  <div class="rsvp" id="rsvp">
    <h2>Підтвердіть вашу присутність</h2>

    <!-- ЗАМІНИ XXXXX НА СВІЙ Formspree ID -->
    <form action="https://formspree.io/f/xeerjolk" method="POST">

      <label class="title">Імʼя та прізвище</label>
      <input type="text" name="name" required />

      <label class="title">Чи будете присутні на весіллі?</label>
      <div class="options">
        <label class="option">
          <input type="radio" name="attendance" value="Так, буду" required />
          <span>Так, буду</span>
        </label>

        <label class="option">
          <input type="radio" name="attendance" value="На жаль, не зможу" />
          <span>На жаль, не зможу</span>
        </label>
      </div>

      <label class="title">Який алкоголь ви оберете? (можна декілька)</label>
      <div class="options">
        <label class="option">
          <input type="checkbox" name="alcohol[]" value="Вино" />
          <span>Вино</span>
        </label>

        <label class="option">
          <input type="checkbox" name="alcohol[]" value="Горілка" />
          <span>Горілка</span>
        </label>

        <label class="option">
          <input type="checkbox" name="alcohol[]" value="Коньяк" />
          <span>Коньяк</span>
        </label>

        <label class="option">
          <input type="checkbox" name="alcohol[]" value="Шампанське" />
          <span>Шампанське</span>
        </label>

        <label class="option">
          <input type="checkbox" name="alcohol[]" value="Не вживаю алкоголь" />
          <span>Не вживаю алкоголь</span>
        </label>
      </div>

      <button type="submit">Підтвердити</button>
      <div class="note">Після відправки відповідь буде збережена.</div>
    </form>
  </div>

</div>

<script>
function openMap() {
  const lat = "47.96447237791111";
  const lng = "33.441974116157695";
  const label = encodeURIComponent("RoseMarine, Кривий Ріг");
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

  if (isIOS) {
    window.open(`https://maps.apple.com/?q=${label}&ll=${lat},${lng}&z=17`);
  } else {
    window.open(`https://www.google.com/maps?q=${lat},${lng}`);
  }
}

const weddingDate = new Date("August 1, 2026 15:00:00").getTime();

const countdown = setInterval(function () {
  const now = new Date().getTime();
  const distance = weddingDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    days + " днів " + hours + " год " + minutes + " хв " + seconds + " сек ";

  if (distance < 0) {
    clearInterval(countdown);
    document.getElementById("countdown").innerHTML = "💍 Сьогодні наше весілля!";
  }
}, 1000);
</script>

</body>
</html>
