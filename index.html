<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дарія & Дмитро – Запрошення</title>

<style>

.bg{
position:fixed;
inset:0;
z-index:-2;
background-position:center;
background-size:cover;
background-repeat:no-repeat;
transform:scale(1.1);
transition:opacity 1s ease;
}

.bg-overlay{
position:fixed;
inset:0;
z-index:-1;
background:rgba(0,0,0,0.35);
}

body{
margin:0;
font-family:Arial, sans-serif;
color:#1f1f1f;
text-align:center;
}

.container{
padding:30px 16px;
max-width:850px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.18);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.25);
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.18);
padding:26px 18px;
}

h1{
font-size:36px;
margin:0;
}

h2{
font-weight:normal;
margin-top:8px;
}

.timer{
font-size:28px;
margin-top:20px;
font-weight:bold;
}

.map{
margin-top:25px;
}

.map iframe{
width:100%;
height:320px;
border:0;
border-radius:12px;
}

.map-btn{
margin-top:12px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#b45a76;
color:white;
font-size:16px;
cursor:pointer;
}

/* RSVP */

.rsvp{
margin-top:30px;
padding:20px;
background:rgba(255,255,255,0.12);
border:1px solid rgba(255,255,255,0.25);
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
backdrop-filter:blur(12px);
text-align:left;
}

.rsvp h2{
text-align:center;
}

.rsvp input[type="text"]{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
}

.options{
margin-top:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.option{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-radius:12px;
background:rgba(255,255,255,0.10);
}

.rsvp button{
margin-top:16px;
width:100%;
padding:12px;
background:#b45a76;
border:none;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="bg-overlay"></div>

<div class="container">
<div class="card">

<h1>💍 Daria & Dmytro</h1>
<h2>01 серпня 2026 • 15:00</h2>

<p>Ми будемо раді бачити вас на нашому весіллі ❤️</p>

<p style="margin-top:20px;font-size:20px;">
✨ До нашого весілля залишилось всього ✨
</p>

<div class="timer" id="countdown"></div>

<p style="margin-top:25px;">
📍 Ресторан «RoseMarine», Кривий Ріг
</p>

<div class="map">
<iframe
src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d944.540017657618!2d33.441354649990835!3d47.96418157398037!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40db1f003f286b05%3A0xf99a77aa010cfefb!2z0KDQtdGB0YLQvtGA0LDQvSAi0JzQsNCz0LXQu9C70LDQvSIu!5e0!3m2!1sru!2sua!4v1772679365465!5m2!1sru!2sua"
loading="lazy"
allowfullscreen="">
</iframe>
</div>

<button class="map-btn" onclick="openMap()">Відкрити карту</button>

<div class="rsvp">

<h2>Підтвердіть вашу присутність</h2>

<form action="https://formspree.io/f/XXXXX" method="POST">

<input type="hidden" name="_subject" value="RSVP — Daria & Dmytro">

<label>Імʼя та прізвище</label>
<input type="text" name="name" required>

<label style="margin-top:15px;">Чи будете присутні?</label>

<div class="options">

<label class="option">
<input type="radio" name="attendance" value="Буду" required>
<span>Буду</span>
</label>

<label class="option">
<input type="radio" name="attendance" value="Не зможу">
<span>Не зможу</span>
</label>

</div>

<label style="margin-top:15px;">Який алкоголь оберете?</label>

<div class="options">

<label class="option">
<input type="checkbox" name="alcohol[]" value="Вино">
<span>Вино</span>
</label>

<label class="option">
<input type="checkbox" name="alcohol[]" value="Горілка">
<span>Горілка</span>
</label>

<label class="option">
<input type="checkbox" name="alcohol[]" value="Коньяк">
<span>Коньяк</span>
</label>

<label class="option">
<input type="checkbox" name="alcohol[]" value="Шампанське">
<span>Шампанське</span>
</label>

</div>

<button type="submit">Підтвердити</button>

</form>

</div>

</div>
</div>

<script>

/* карта */

function openMap(){

const lat="47.96447237791111";
const lng="33.441974116157695";

const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);

if(isIOS){
window.open(`https://maps.apple.com/?ll=${lat},${lng}`);
}else{
window.open(`https://www.google.com/maps?q=${lat},${lng}`);
}

}

/* таймер */

const weddingDate=new Date("August 1, 2026 15:00:00").getTime();

setInterval(function(){

const now=new Date().getTime();
const distance=weddingDate-now;

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+" днів "+hours+" год "+minutes+" хв "+seconds+" сек ";

},1000);

/* фон фото */

const photos=[
"images/photo1.jpg",
"images/photo2.jpg",
"images/photo3.jpg"
];

const bg=document.getElementById("bg");

let i=0;

function setBg(index){

bg.style.opacity=0;

setTimeout(()=>{

bg.style.backgroundImage=`url('${photos[index]}')`;
bg.style.opacity=1;

},300);

}

setBg(i);

setInterval(()=>{

i=(i+1)%photos.length;
setBg(i);

},7000);

/* паралакс */

window.addEventListener("scroll",()=>{

const scrolled=window.scrollY;

bg.style.transform="scale(1.1) translateY("+scrolled*0.2+"px)";

});

</script>

</body>
</html>
